name: Build DelagR

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Optional version tag to publish, for example v2.1.0
        required: false
  push:
    branches:
      - main

# Opt JS-based actions into the Node 24 runtime ahead of the 2026 default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            asset: DelagR.exe
            artifact: DelagR-windows
            build: pwsh ./build_windows.ps1
            path: dist/DelagR.exe
            smoke: ./dist/DelagR.exe --selftest
          - os: macos-latest
            asset: DelagR-macos
            artifact: DelagR-macos
            build: bash ./build_macos.sh
            path: dist/DelagR-macos
            smoke: ./dist/DelagR-macos --selftest
          - os: ubuntu-latest
            asset: DelagR-linux
            artifact: DelagR-linux
            build: bash ./build_linux.sh
            path: dist/DelagR-linux
            smoke: xvfb-run -a ./dist/DelagR-linux --selftest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libgl1 libegl1 libxcb-cursor0 \
            libxkbcommon-x11-0 libdbus-1-3 '^libxcb.*-dev' x11-utils xvfb

      - name: Build ${{ matrix.asset }}
        run: ${{ matrix.build }}

      - name: Smoke test ${{ matrix.asset }}
        run: ${{ matrix.smoke }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error

  release:
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir -p release
          cp artifacts/DelagR-windows/DelagR.exe release/DelagR.exe
          cp artifacts/DelagR-macos/DelagR-macos release/DelagR-macos
          cp artifacts/DelagR-linux/DelagR-linux release/DelagR-linux
          ls -l release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: ${{ github.event.inputs.release_version }}
          files: release/*
          generate_release_notes: true
