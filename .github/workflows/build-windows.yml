name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Optional version tag to publish, for example v0.1.1
        required: false
  push:
    branches:
      - main

# Opt JS-based actions into the Node 24 runtime ahead of the June 2026 default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-2025
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build DelagR.exe
        shell: pwsh
        run: ./build_windows.ps1

      - name: Upload executable artifact
        uses: actions/upload-artifact@v5
        with:
          name: DelagR-windows-exe
          path: dist/DelagR.exe

      - name: Create release tag
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != '' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ github.event.inputs.release_version }}" >/dev/null 2>&1; then
            echo "Tag already exists locally."
          elif git ls-remote --tags origin "refs/tags/${{ github.event.inputs.release_version }}" | grep "${{ github.event.inputs.release_version }}" >/dev/null 2>&1; then
            echo "Tag already exists on origin."
          else
            git tag "${{ github.event.inputs.release_version }}"
            git push origin "${{ github.event.inputs.release_version }}"
          fi

      - name: Publish GitHub release
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: ${{ github.event.inputs.release_version }}
          files: dist/DelagR.exe
          generate_release_notes: true
